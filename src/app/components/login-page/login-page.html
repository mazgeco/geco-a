<div class="login-container">
  <p-card class="card-login">

    <ng-template #title>
      Ingreso
    </ng-template>

    <ng-template #subtitle>
      Digite su nombre de usuario y su clave para ingresar
    </ng-template>

    <form (ngSubmit)="onSubmit()" [formGroup]="loginForm" class="w-full">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input type="text" pInputText pSize="small" id="username" class="w-full" formControlName="username"
          [ngClass]="{ 'ng-invalid ng-dirty': isInvalid('username')}" />
        @if (isInvalid('username')) {
        <small class="text-danger">
          Campo obligatorio
        </small>
        }
      </div>

      <div class="form-group">
        <div class="form-group">
          <label for="password">Clave</label>

          <p-password id="password" formControlName="password" size="small" [feedback]="false" [toggleMask]="true"
            autocomplete="off" class="w-full" [ngClass]="{
      'ng-invalid ng-dirty': isInvalid('password')
    }">
          </p-password>

          @if (isInvalid('password')) {
          <small class="text-danger">
            Campo obligatorio
          </small>
          }
        </div>
      </div>

      <div class="mb-2">
        <p-button label="Ingresar" type="submit" />
      </div>

      <div class="mb-2">
        <p-button label="Olvidé mi clave" type="submit" />
      </div>
      @if (invalidLogin()) {
      <div class="row text-danger">
        <div class="col-12">
          <small>
            Usuario o clave inválidos
          </small>
        </div>
      </div>
      }
    </form>
  </p-card>
</div>
