<div class="grid w-full mt-1">
  <div class="col-12 md:col-6 lg:col-4">
    <p-card class="h-full">
      <p-chart type="pie" [data]="data" [options]="options" width="400" height="400"> </p-chart>
    </p-card>
  </div>
  <div class="col-12 md:col-6 lg:col-4">
    <p-card class="h-full">
      <p-chart type="bar" [data]="barData" [options]="barOptions" height="300">
      </p-chart>
    </p-card>
  </div>
  <div class="col-12 md:col-6 lg:col-4">
    <p-card class="h-full">
      
    </p-card>
  </div>
  
</div>
